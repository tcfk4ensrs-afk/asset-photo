<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資産撮影ツール</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
}

#qr-reader {
  width: 300px;
  margin: auto;
}

button {
  font-size: 18px;
  padding: 10px 20px;
  margin-top: 20px;
}

#assetNumber {
  font-size: 24px;
  font-weight: bold;
  color: blue;
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>固定資産 撮影アプリ</h2>

<div id="qr-reader"></div>

<div id="assetNumber">未スキャン</div>

<button onclick="takePhoto()">写真を撮る</button>

<script>

let assetNumber = "";

// QR読み取り
function startScanner() {
  const qr = new Html5Qrcode("qr-reader");
  
  qr.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: 250
    },
    (decodedText) => {
      assetNumber = decodedText;
      document.getElementById("assetNumber").innerText =
        "資産番号: " + assetNumber;

      qr.stop();
    },
    (error) => {}
  );
}

startScanner();

// 写真撮影（ファイル名生成）
function takePhoto() {

  if (!assetNumber) {
    alert("先にQRコードを読み取ってください");
    return;
  }

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.capture = 'environment';

  input.onchange = (e) => {
    const file = e.target.files[0];

    const now = new Date();
    const timestamp =
      now.getFullYear() +
      ("0"+(now.getMonth()+1)).slice(-2) +
      ("0"+now.getDate()).slice(-2) + "_" +
      ("0"+now.getHours()).slice(-2) +
      ("0"+now.getMinutes()).slice(-2) +
      ("0"+now.getSeconds()).slice(-2);

    const newName = assetNumber + "_" + timestamp + ".jpg";

    // ダウンロードリンク作る
    const link = document.createElement('a');
    link.href = URL.createObjectURL(file);
    link.download = newName;
    link.click();

    // QRリセット（事故防止）
    assetNumber = "";
    document.getElementById("assetNumber").innerText = "未スキャン";

    // 再スキャン開始
    startScanner();
  };

  input.click();
}

</script>

</body>
</html>
